name: Build Android APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Create and Configure Project
        run: |
          # 1. Create fresh project with unique package name
          flutter create --template=app --platforms=android --org com.bader bader_app_new
          
          # 2. Inject permissions into the clean AndroidManifest.xml
          # We insert permissions before the <application> tag
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />' bader_app_new/android/app/src/main/AndroidManifest.xml
          
          # 3. Update app label
          sed -i 's/android:label="bader_app_new"/android:label="بادر"/g' bader_app_new/android/app/src/main/AndroidManifest.xml
          
          # 4. Copy our custom logic
          cp -f bader_app/pubspec.yaml bader_app_new/pubspec.yaml
          cp -f bader_app/lib/main.dart bader_app_new/lib/main.dart
          
          # 5. Handle assets
          mkdir -p bader_app_new/assets
          if [ -d bader_app/assets ]; then cp -r bader_app/assets/* bader_app_new/assets/ || true; fi
          
          # 6. Replace old folder with the new perfectly configured one
          rm -rf bader_app
          mv bader_app_new bader_app
          
      - name: Get dependencies
        run: flutter pub get
        working-directory: bader_app
        
      - name: Build APK
        run: flutter build apk --release
        working-directory: bader_app
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bader_android_build
          path: bader_app/build/app/outputs/flutter-apk/app-release.apk
